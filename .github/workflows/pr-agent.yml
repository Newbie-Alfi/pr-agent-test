name: PR Agent

on:
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Run PR Agent
        run: |
          COMMAND=$(echo "${{ github.event.comment.body }}" | cut -d' ' -f1 | tr -d '/')

          docker run --rm \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e OPENAI_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e OPENAI_API_BASE="https://openrouter.ai/api/v1" \
            -e OPENAI_MODEL="anthropic/claude-3.5-sonnet" \
            codiumai/pr-agent:latest \
            --pr_url="https://github.com/${{ github.repository }}/pull/${{ github.event.issue.number }}" \
            $COMMAND