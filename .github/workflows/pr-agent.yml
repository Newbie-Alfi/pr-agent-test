name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Run PR Agent
        run: |
          docker run --rm \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e OPENAI_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e OPENAI_API_BASE="https://openrouter.ai/api/v1" \
            -e CONFIG_MODEL="openrouter/anthropic/claude-3.5-sonnet" \
            -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
            -e GITHUB_EVENT_PATH="/github/workflow/event.json" \
            -v "${{ github.workspace }}:/github/workspace" \
            -v "${{ github.event_path }}:/github/workflow/event.json" \
            codiumai/pr-agent:latest \
            python -m pr_agent.cli